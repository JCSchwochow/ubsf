 atenção e o cuidado da equipe de saúde. Essa parceria fortalece a rede de proteção à criança, pois possibilita que escola e saúde atuem de forma articulada, compartilhando responsabilidades e buscando soluções conjuntas para as necessidades identificadas."}, {"value": "Como possibilidade de melhoria, seria importante ampliar ainda mais as ações preventivas e de acompanhamento periódico dentro da unidade escolar, como visitas mais frequentes da equipe de saúde ou momentos educativos com crianças e famílias. Isso pode fortalecer ainda mais a integração entre os serviços e contribuir para a prevenção de problemas de saúde."}, {"value": "Um dos principais desafios para fortalecer a articulação intersetorial entre a Unidade Escolar e a Unidade Básica de Saúde é a ausência de momentos sistematizados de encontro entre as equipes para alinhamento e discussão de casos. Muitas vezes as demandas surgem no cotidiano e são encaminhadas de forma pontual, conforme a necessidade, o que acaba limitando um acompanhamento mais preventivo e planejado. Uma possibilidade de melhoria seria a realização de encontros periódicos entre escola e unidade de saúde, semelhantes a um conselho de classe, voltados para o alinhamento de informações e discussão de situações que envolvem crianças que necessitam de acompanhamento pediátrico, que se encontram em situação de vulnerabilidade ou que apresentam alguma demanda de saúde que merece atenção preventiva. Esses momentos de diálogo poderiam fortalecer ainda mais a parceria, possibilitando um olhar mais integral sobre o desenvolvimento e o bem-estar das crianças, além de contribuir para ações de prevenção e cuidado compartilhado entre educação e saúde."}, {"value": "Na Educação Infantil, uma ação que poderia fortalecer a interação entre a Unidade Escolar e a Unidade Básica de Saúde seria a realização de dois encontros ao longo do ano, organizados após os momentos de conselho escolar. Esses encontros poderiam ser destinados ao alinhamento entre as equipes, possibilitando a discussão de situações que envolvem crianças que necessitam de acompanhamento de saúde, avaliação pediátrica ou que se encontram em situação de vulnerabilidade. Esse espaço de diálogo permitiria compartilhar informações importantes, planejar encaminhamentos quando necessário e também pensar em ações preventivas e de promoção da saúde dentro da unidade escolar. A iniciativa contribuiria para qualificar a comunicação entre os setores e fortalecer o cuidado integral com as crianças e suas famílias."}, {"value": "Parcialmente"}, {"value": "As famílias tem reclamado que está demorando muito o atendimento pediátrico"}, {"value": "As famílias têm relatado que o tempo de espera para atendimento pediátrico tem sido longo, o que gera preocupação, principalmente em situações que envolvem crianças pequenas que necessitam de avaliação mais rápida. Em alguns casos, a escola acaba sendo o primeiro espaço onde sinais de vulnerabilidade ou necessidade de acompanhamento são percebidos, e a demora no atendimento pode dificultar o encaminhamento e o acompanhamento adequado dessas situações. Como sugestão, poderia ser pensado em um fluxo de encaminhamento ou em momentos de articulação entre a Unidade Escolar e a Unidade Básica de Saúde para avaliar casos que demandam maior prioridade, especialmente relacionados à primeira infância. Essa organização poderia contribuir para agilizar alguns atendimentos e fortalecer o cuidado preventivo e integral às crianças."}, {"value": "A Unidade Básica de Saúde verificou a situação vacinal dos alunos."}, {"value": "A unidade de saúde realizou vacinação na unidade escolar no ano de 2025"}, {"value": "Não"}, {"value": "Não ocorreu"}, {"value": "Não ocorreu"}, {"value": "Não"}, {"value": "Sim"}, {"value": "A unidade de saúde vem presencialmente na unidade solicitar informação."}, {"value": "Parcialmente satisfeito"}, {"value": "Sim"}, {"value": ""}, {"value": "Sim"}, {"value": ""}, {"value": "Parcialmente satisfeito"}, {"value": " , A Unidade Básica de Saúde encaminhou os bilhetes para as unidades escolares dos alunos com pendências na situação vacinal (com o nome do aluno, ano/série e turma), solicitando que as famílias compareçam na unidade básica de saúde."}, {"value": ""}, {"value": "Sim"}, {"value": "Não ocorreu"}, {"value": "Não ocorreu"}, {"value": "Não"}, {"value": "Sim"}, {"value": "Unidade Escolar envia via e-mail à Unidade Básica de Saúde"}, {"value": "Parcialmente satisfeito"}, {"value": "Não"}, {"value": ""}, {"value": "Sim"}, {"value": ""}, {"value": "Parcialmente insatisfeito"}, {"value": "Promoção da alimentação saudável e prevenção da obesidade infantil, Promoção da Cultura de Paz, Cidadania e Direitos Humanos, Promoção da Atividade Física, Saúde Ambiental, Ações de combate ao mosquito Aedes aegypti, Saúde Bucal (escovação/flúor), Saúde Bucal (avaliação), Ações de prevenção à COVID-19, Avaliação Oftalmológica (Teste Snellen), Encaminhamento para consulta Oftalmológica"}, {"value": "Acessibilidade, Espaço físico"}, {"value": "Sim"}, {"value": "Não"}, {"value": "Não sabe informar"}], [{}, {}, {"value": "CEI Sementinha"}, {"value": "UBSF COMASA"}, {"value": "Na minha percepção, os pontos fortes da parceria entre a Unidade Básica de Saúde e a Unidade Escolar estão na integração de saberes e na atuação conjunta em prol do desenvolvimento integral dos estudantes. Essa parceria fortalece ações de promoção da saúde, prevenção de doenças e identificação precoce de situações de vulnerabilidade.\nAlém disso, possibilita a realização de atividades educativas sobre temas como alimentação saudável, saúde mental, vacinação e higiene, aproximando os profissionais de saúde da realidade escolar. Também contribui para o acompanhamento mais efetivo dos alunos, envolvendo famílias e comunidade, e promovendo um ambiente mais saudável, acolhedor e seguro para todos."}, {"value": "Na minha percepção, algumas fragilidades da parceria entre a Unidade Básica de Saúde e a Unidade Escolar estão relacionadas, principalmente, à falta de comunicação contínua e ao planejamento conjunto insuficiente. Muitas vezes, as ações acontecem de forma pontual, sem acompanhamento sistemático ou avaliação dos resultados.\nOutra dificuldade pode ser a sobrecarga de trabalho das equipes, tanto da saúde quanto da educação, o que limita o tempo disponível para reuniões, alinhamentos e execução de atividades integradas. Também podem existir desafios como rotatividade de profissionais, ausência de definição clara de responsabilidades e pouca participação das famílias.\nAlém disso, a falta de recursos materiais e apoio institucional pode comprometer a continuidade das ações, tornando a parceria dependente da iniciativa individual de alguns profissionais, em vez de estar estruturada como uma política permanente e articulada."}, {"value": "O principal desafio enfrentado pela unidade para realizar uma articulação intersetorial de qualidade com a unidade parceira é a dificuldade de alinhar agendas e prioridades institucionais. Muitas vezes, tanto a equipe da saúde quanto a da educação lidam com demandas urgentes e sobrecarga de trabalho, o que limita o tempo disponível para planejamento conjunto, reuniões sistemáticas e acompanhamento das ações.\nAlém disso, a ausência de um fluxo de comunicação estruturado e de definição clara de responsabilidades pode gerar desencontros, ações pontuais e pouca continuidade das atividades. Esse cenário acaba comprometendo a consolidação de uma parceria mais estratégica, contínua e efetiva."}, {"value": "Se eu pudesse sugerir uma ação prioritária para melhorar a qualidade da interação intersetorial ao longo do ano, seria a institucionalização de reuniões periódicas de planejamento e avaliação entre as equipes da saúde e da educação.\nEsses encontros, com calendário previamente definido, permitiriam alinhar prioridades, organizar um plano de ação conjunto, distribuir responsabilidades e acompanhar os resultados das atividades desenvolvidas. Além disso, favorec ue": "Não vejo que haja barreiras, principalmente porque nos esforçamos ao máximo para atender tudo que nos é pedido."}, {"value": "O atendimento mais rápido aos alunos que necessitam pois a demora repercute no seu desenvolvimento escolar."}, {"value": "Parcialmente"}, {"value": "Muitas mães retornam dizendo que estão aguardando."}, {"value": "Nós não encaminhamos alunos para a UBS, não temos permissão para isso. A escola apenas sugere aos pais que busquem auxílio quando necessário."}, {"value": "A Unidade Básica de Saúde encaminhou os bilhetes para as unidades escolares dos alunos com pendências na situação vacinal (com o nome do aluno, ano/série e turma), solicitando que as famílias compareçam na unidade básica de saúde."}, {"value": "Os bilhetes eram genéricos. Não vieram bilhetes direcionados aos alunos com pendências."}, {"value": "Não ocorreu"}, {"value": "Não ocorreu"}, {"value": "Não"}, {"value": "Sim"}, {"value": "Sim"}, {"value": "Unidade Escolar envia via e-mail à Unidade Básica de Saúde"}, {"value": "Completamente satisfeito"}, {"value": "Sim"}, {"value": ""}, {"value": "Sim"}, {"value": ""}, {"value": "Completamente satisfeito"}, {"value": "Promoção da alimentação saudável e prevenção da obesidade infantil, Saúde sexual e reprodutivo e prevenção de HIV/IST, Promoção da Cultura de Paz, Cidadania e Direitos Humanos, Saúde Bucal (escovação/flúor), Saúde Bucal (avaliação)"}, {"value": "Disponibilidade para o planejamento das atividades"}, {"value": "Sim"}, {"value": "Não"}, {"value": "Não"}], [{}, {}, {"value": "EM Anaburgo"}, {"value": "UBSF ANABURGO"}, {"value": "Acessibilidade de comunicação com a equipe de enfermagem. "}, {"value": "Não encontramos fragilidades na comunicação e parceria. Apenas o posto do zoneamento de nossa Unidade possui apenas um médico clínico geral e não possui outras especialidades. "}, {"value": "Não encontramos dificuldades. Sempre são atenciosos e dispostos a ajudar."}, {"value": "Momentos trimestrais (ou com maior periodicidade) presenciais de conversa e troca com a equipe de enfermagem do posto.\nTambém precisamos de ajuda com a parte de higiene de alguns alunos. Temos alguns casos específicos de alunos que percebemos que estão há dias sem tomar banho, escovar dentes, com muito piolho. Seria de grande ajuda se houvesse alguma forma de o posto ajudar indo até a casa dessas famílias ou chamando para  instruí-los. A escola busca fazer essa instrução, porém é um assunto delicado e nem sempre as famílias recebem de uma forma tranquila. "}, {"value": "Parcialmente"}, {"value": "A maioria das famílias procura o posto após solicitações da escola para necessárias investigações. Algumas não. As que procuram conseguem agendar atendimento. Nossa maior dificuldade são os casos de alunos que necessitam de atendimento com profissionais que não fazem parte do posto, como é o caso do neurologista. Quando o aluno entra na fila para esse especialista a demora é muito grande e muitas vezes não acontece. Compreendemos que casos de aprendizagem precisam ser resolvidos na escola, mas temos alunos de 6º ano que não são alfabetizados embora tenham passado por anos por reforço escolar e intervenções pontuais em suas dificuldades. Alunos que percebemos que apresentam transtornos de aprendizagem ou deficiências e as famílias não tem condições financeiras de procurar especialistas ou terapias necessárias e também não conseguem via SUS. "}, {"value": "Normalmente a escola conversa com as famílias, se necessário faz relatórios de aprendizagem e solicita que a família procure o posto para um primeiro atendimento. Em casos mais sérios a escola liga para a enfermeira do posto e explica a situação buscando ajuda, tirando dúvidas.."}, {"value": "A Unidade Básica de Saúde verificou a situação vacinal dos alunos., A Unidade Básica de Saúde assinalou a listagem dos alunos com pendências na situação vacinal., A Unidade Básica de Saúde encaminhou os bilhetes para as unidades escolares dos alunos com pendências na situação vacinal (com o nome do aluno, ano/série e turma), solicitando que as famílias compareçam na unidade básica de saúde."}, {"value": ""}, {"value": "Não"}, {"value": "Não ocorreu"}, {"value": "Não ocorreu"}, {"value": "Não"}, {"value": "Sim"}, {"value": "Unidade Escolar envia via e-mail à Unidade Básica de Saúde"}, {"value": "Parcialmente satisfeito"}, {"value": "Sim"}, {"value": ""}, {"value": "Sim"}, {"value": ""}, {"value": "Parcialmente satisfeito"}, {"value": "Promoção da alimentação saudável e prevenção da obesidade infantil, Saúde sexual e reprodutivo e prevenção de HIV/IST, Prevenção ao uso de álcool, tabaco e outras drogas, Promoção da Cultura de Paz, Cidadania e Direitos Humanos, Promoção da Atividade Física, Saúde Ambiental, Ações de combate ao mosquito Aedes aegypti, Prevenção de doenças negligenciadas, Saúde Bucal (escovação/flúor), Saúde Bucal (avaliação), Ações de prevenção à COVID-19, Avaliação Oftalmológica (Teste Snellen), Prevenção das Violências e dos Acidentes, Promoção da Saúde Mental da Comunidade Escolar"}, {"value": "Disponibilidade para o planejamento das atividades, Acessibilidade, Espaço físico, Recursos disponíveis"}, {"value": "Sim"}, {"value": "Não"}, {"value": "Sim"}], [{}, {}, {"value": "EM Anita Garibaldi"}, {"value": "UBSF FLORESTA"}, {"value": "Acompanhamento, vacinação, auxilio e recados importantes."}, {"value": "nenhuma"}, {"value": "A parceria é muito boa, temos o numero de telefone e conforme solicitado alguma reunião, ou até participação de reunião de pais, temos essa parceria."}, {"value": "continua com a solicitação de auxilio via WhatsApp"}, {"value": "Sim"}, {"value": ""}, {"value": "Geralmente a orientadora encaminha e a equipe da UBS entra contato com a escola para melhor esclarecimento."}, {"value": "A Unidade Básica de Saúde verificou a situação vacinal dos alunos., A Unidade Básica de Saúde assinalou a listagem dos alunos com pendências na situação vacinal."}, {"value": "Estão em processo de orientações com os pais, estarã
